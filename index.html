<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>GLOBAL TRX • AI/50 LOGICS</title>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #0a0c12;
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* KEY SECTION */
        .key-section {
            background: linear-gradient(145deg, #1e2533, #131a26);
            border-radius: 40px;
            padding: 40px 24px;
            margin: 20px 0 40px;
            border: 1px solid #2f3a4b;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .lock-icon {
            width: 70px;
            height: 70px;
            background: #2a3442;
            border-radius: 30px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid #3b7cff;
            box-shadow: 0 8px 0 #0f1a2e;
        }

        .lock-icon svg {
            width: 34px;
            height: 34px;
            fill: none;
            stroke: #3b7cff;
            stroke-width: 2.5;
            stroke-linecap: round;
        }

        .key-title {
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .key-sub {
            color: #8f9bb3;
            text-align: center;
            font-size: 15px;
            margin-bottom: 32px;
        }

        .key-input-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .key-input {
            background: #0f151f;
            border: 2px solid #28303f;
            border-radius: 28px;
            padding: 18px 24px;
            font-size: 18px;
            color: #ffffff;
            outline: none;
            text-align: center;
            letter-spacing: 2px;
        }

        .key-input:focus {
            border-color: #3b7cff;
            background: #121b28;
        }

        .key-button {
            background: linear-gradient(145deg, #3b7cff, #2a5fdd);
            border: none;
            border-radius: 28px;
            padding: 18px 24px;
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            cursor: pointer;
            box-shadow: 0 10px 0 #13203a;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.1s ease;
        }

        .key-button:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #13203a;
        }

        .key-message {
            color: #ff8a8a;
            font-size: 15px;
            text-align: center;
            margin-top: 20px;
            min-height: 24px;
        }

        /* Main Content */
        .main-content {
            display: none;
        }

        /* Header */
        .header {
            background: linear-gradient(145deg, #1e2432, #151b26);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid #2f3542;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 14px;
            color: #8f9bb3;
        }

        /* Mode Selector */
        .mode-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .mode-btn {
            flex: 1;
            background: #1a1f2b;
            border: 1px solid #2f3542;
            border-radius: 20px;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            color: #8f9bb3;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }

        .mode-btn.active {
            background: linear-gradient(145deg, #3b7cff, #2a5fdd);
            color: #ffffff;
            border-color: #3b7cff;
            box-shadow: 0 4px 12px rgba(59,124,255,0.3);
        }

        /* Timer Card */
        .timer-card {
            background: #1a1f2b;
            border-radius: 24px;
            padding: 24px 20px;
            margin-bottom: 16px;
            border: 1px solid #2f3542;
            text-align: center;
        }

        .timer-label {
            font-size: 14px;
            color: #8f9bb3;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .timer-value {
            font-size: 72px;
            font-weight: 700;
            color: #3b7cff;
            line-height: 1;
            margin-bottom: 12px;
            font-family: 'Courier New', monospace;
            letter-spacing: 4px;
        }

        .period-value {
            display: none; /* Period completely hidden here */
        }

        /* Prediction Card */
        .prediction-card {
            background: linear-gradient(145deg, #1e2a3a, #15222f);
            border-radius: 32px;
            padding: 32px 20px;
            margin-bottom: 16px;
            border: 1px solid #3b7cff;
            text-align: center;
        }

        .next-period {
            display: none; /* Next period hidden */
        }

        .prediction-value {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 16px;
            letter-spacing: 4px;
        }

        .prediction-value.big {
            color: #3b7cff;
            text-shadow: 0 0 20px rgba(59,124,255,0.3);
        }

        .prediction-value.small {
            color: #ff4d4d;
            text-shadow: 0 0 20px rgba(255,77,77,0.3);
        }

        .confidence-text {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 16px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #0f131a;
            border-radius: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #3b7cff;
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 30px;
        }

        .progress-fill.small {
            background: #ff4d4d;
        }

        /* API Status */
        .api-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 8px 0 12px;
            font-size: 12px;
            color: #5d6a83;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #2ecc71;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: #1a1f2b;
            border-radius: 20px;
            padding: 16px 8px;
            border: 1px solid #2f3542;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #8f9bb3;
            margin-bottom: 8px;
            font-weight: 500;
            white-space: nowrap;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
        }

        .stat-value.green {
            color: #2ecc71;
        }

        .stat-value.blue {
            color: #3b7cff;
        }

        .stat-value.red {
            color: #ff4d4d;
        }

        /* History Section - Last 10 Results Only (Period shown here only) */
        .history-section {
            background: #1a1f2b;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #2f3542;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
        }

        .history-table th {
            text-align: left;
            padding: 12px 8px;
            font-size: 12px;
            color: #8f9bb3;
            font-weight: 500;
            border-bottom: 1px solid #2f3542;
        }

        .history-table td {
            padding: 12px 8px;
            font-size: 13px;
            border-bottom: 1px solid #262d3b;
        }

        .period-cell {
            color: #ffffff;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .pred-cell, .actual-cell {
            font-weight: 600;
        }

        .pred-cell.big, .actual-cell.big {
            color: #3b7cff;
        }

        .pred-cell.small, .actual-cell.small {
            color: #ff4d4d;
        }

        .win-badge {
            background: rgba(46, 204, 113, 0.1);
            color: #2ecc71;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
        }

        .lose-badge {
            background: rgba(255, 77, 77, 0.1);
            color: #ff4d4d;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
        }

        .auto-refresh-note {
            text-align: center;
            color: #4e5c73;
            font-size: 12px;
            margin: 8px 0 20px;
        }

        .loading-indicator {
            color: #3b7cff;
            font-size: 14px;
            margin: 10px 0;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- KEY SECTION -->
        <div class="key-section" id="keySection">
            <div class="lock-icon">
                <svg viewBox="0 0 24 24">
                    <rect x="5" y="11" width="14" height="11" rx="2" ry="2" stroke="currentColor" />
                    <path d="M8 11V8a4 4 0 0 1 8 0v3" />
                </svg>
            </div>
            <div class="key-title">ACCESS VAULT</div>
            <div class="key-sub">enter private key</div>
            <div class="key-input-group">
                <input type="text" id="keyInput" class="key-input" placeholder="KEY" autocomplete="off">
                <button class="key-button" onclick="checkKey()">UNLOCK</button>
            </div>
            <div id="keyMessage" class="key-message"></div>
        </div>

        <!-- Main Content -->
        <div id="mainContent" class="main-content">
            <!-- Header -->
            <div class="header">
                <h1>GLOBAL TRX</h1>
                <p>DEVELOPED BY MICK</p>
            </div>

            <!-- API Status -->
            <div class="api-status">
                <span class="status-dot"></span>
                <span>draw.ar-lottery01.com</span>
            </div>

            <!-- Mode Selector -->
            <div class="mode-selector">
                <button class="mode-btn active" onclick="setMode('pattern')" id="modePattern">PATTERN 50</button>
                <button class="mode-btn" onclick="setMode('ai')" id="modeAI">AI PREDICTION</button>
            </div>

            <!-- Timer (No Period shown) -->
            <div class="timer-card">
                <div class="timer-label">NEXT RESULT IN</div>
                <div class="timer-value" id="timer">00:00</div>
                <!-- Period value hidden via CSS -->
            </div>

            <!-- Prediction (No Period shown) -->
            <div class="prediction-card">
                <!-- Next period hidden via CSS -->
                <div class="prediction-value" id="predictionValue">--</div>
                <div class="confidence-text" id="confidenceText">CONFIDENCE: 0%</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="confidenceBar"></div>
                </div>
                <div id="aiLoading" class="loading-indicator" style="display: none;">AI ANALYZING 1000 RESULTS...</div>
            </div>

            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">WIN RATE</div>
                    <div class="stat-value green" id="winRateStat">0%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">W/L</div>
                    <div class="stat-value" id="winLossStat">0/0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">TOTAL</div>
                    <div class="stat-value" id="totalStat">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">CURRENT X</div>
                    <div class="stat-value blue" id="currentXStat">1X</div>
                </div>
            </div>

            <!-- History Section - Last 10 Results Only (Period shown here only) -->
            <div class="history-section">
                <div class="section-title">LAST 10 RESULTS</div>
                <table class="history-table" id="historyTable">
                    <thead>
                        <tr>
                            <th>PERIOD</th>
                            <th>PRED/ACT</th>
                            <th>RESULT</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody"></tbody>
                </table>
            </div>

            <div class="auto-refresh-note">AUTO REFRESH EVERY MINUTE</div>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBiUJPpEmepO0XiWmhPA8rMZjioB5Y2wr4",
            authDomain: "global-trx-db.firebaseapp.com",
            databaseURL: "https://global-trx-db-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "global-trx-db",
            storageBucket: "global-trx-db.firebasestorage.app",
            messagingSenderId: "20311434523",
            appId: "1:20311434523:web:b5cd2eded2d7cd9e011fbe"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ==================== CONFIGURATION ====================
        const Config = {
            API_URL: "https://draw.ar-lottery01.com/TrxWinGo/TrxWinGo_1M/GetHistoryIssuePage.json",
            WAIT_TIME_BETWEEN_CHECKS: 10
        };

        // ==================== PATTERNS ====================
        const PATTERNS = [
            "SBSBBS", "BBSSBBSBS", "SBSBSBSBS", "BBBBBBBSB", "SBSBSBSBSSS",
            "BSSBSSSB", "BSBSBBSS", "BSSBSSBBS", "BSBBSB", "BBSSBSS",
            "SSBSBBSB", "SBBSSB", "BBSBBS", "SBSSB", "BSSBBS",
            "SSBBSBB", "BBSBSB", "SBBSBSB", "SBBSB", "SBBSBSBB"
        ];

        // ==================== GLOBAL VARIABLES ====================
        let allPeriods = [];
        let periodData = {};
        let predictionHistory = [];
        let currentMode = 'pattern';
        let lastPrediction = null;
        let lastPeriodChecked = null;
        let currentBetX = 1;
        let totalWins = 0;
        let totalLosses = 0;

        // Pattern Analyzer
        class PatternAnalyzer {
            constructor() {
                this.recentHistory = [];
                this.maxHistoryLength = 20;
                this.patterns = PATTERNS;
            }

            addResult(result) {
                this.recentHistory.push(result);
                if (this.recentHistory.length > this.maxHistoryLength) {
                    this.recentHistory.shift();
                }
            }

            predictNext() {
                if (this.recentHistory.length < 3) {
                    return { pred: Math.random() > 0.5 ? 'B' : 'S', confidence: 50 };
                }
                
                for (let length = 6; length > 2; length--) {
                    if (this.recentHistory.length >= length) {
                        const currentSeq = this.recentHistory.slice(-length).join('');
                        const matches = [];
                        
                        for (const pattern of this.patterns) {
                            if (pattern.includes(currentSeq)) {
                                const pos = pattern.indexOf(currentSeq);
                                if (pos + currentSeq.length < pattern.length) {
                                    matches.push(pattern[pos + currentSeq.length]);
                                }
                            }
                        }
                        
                        if (matches.length > 0) {
                            const bCount = matches.filter(m => m === 'B').length;
                            const sCount = matches.filter(m => m === 'S').length;
                            const total = bCount + sCount;
                            
                            if (bCount > sCount) {
                                return { pred: 'B', confidence: Math.round((bCount / total) * 100) };
                            } else if (sCount > bCount) {
                                return { pred: 'S', confidence: Math.round((sCount / total) * 100) };
                            }
                        }
                    }
                }
                
                return { pred: Math.random() > 0.5 ? 'B' : 'S', confidence: 50 };
            }
        }

        const patternAnalyzer = new PatternAnalyzer();

        // ==================== KEY CHECK ====================
        async function checkKey() {
            const key = document.getElementById('keyInput').value.trim();
            const messageEl = document.getElementById('keyMessage');
            
            if (!key) {
                messageEl.textContent = 'KEY REQUIRED';
                return;
            }

            try {
                const snapshot = await database.ref('/global_trx/keys/' + key).once('value');
                const keyData = snapshot.val();
                
                if (!keyData) {
                    messageEl.textContent = 'INVALID KEY';
                    return;
                }

                const today = new Date();
                const expiry = new Date(keyData.expiry);
                
                if (expiry < today) {
                    messageEl.textContent = 'KEY EXPIRED';
                    return;
                }

                if (keyData.used >= keyData.limit) {
                    messageEl.textContent = 'LIMIT REACHED';
                    return;
                }

                await database.ref('/global_trx/keys/' + key + '/used').set(keyData.used + 1);
                
                document.getElementById('keySection').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                
                // Initial load
                await fetchAPIData();
                startTimer();
                
            } catch (error) {
                console.error(error);
                messageEl.textContent = 'SYSTEM ERROR';
            }
        }

        // ==================== API FETCH ====================
        async function fetchAPIData(retryCount = 3) {
            const headers = {
                "Accept": "application/json",
                "Content-Type": "application/json",
                "User-Agent": "Mozilla/5.0"
            };
            
            const currentTimestamp = Date.now();
            const apiUrl = `${Config.API_URL}?ts=${currentTimestamp}`;
            
            for (let attempt = 0; attempt < retryCount; attempt++) {
                try {
                    const response = await fetch(apiUrl, { headers });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    
                    const data = await response.json();
                    
                    if (data && data.data && data.data.list) {
                        const list = data.data.list;
                        const results = [];
                        
                        for (const item of list) {
                            try {
                                const number = parseInt(item.number || 0);
                                const period = item.issueNumber || "Unknown";
                                
                                results.push({
                                    period: period,
                                    result: number >= 5 ? 'B' : 'S',
                                    number: number
                                });
                            } catch (e) {
                                console.warn("Parse error:", e);
                            }
                        }
                        
                        if (results.length > 0) {
                            return results;
                        }
                    }
                    
                } catch (error) {
                    console.warn(`Attempt ${attempt + 1} failed:`, error);
                    if (attempt < retryCount - 1) {
                        await new Promise(resolve => setTimeout(resolve, 2000));
                    }
                }
            }
            
            return [];
        }

        // ==================== LOAD DATA ====================
        async function loadFullData() {
            try {
                const apiData = await fetchAPIData();
                
                if (apiData.length === 0) return;
                
                // Update periodData
                periodData = {};
                apiData.forEach(item => {
                    periodData[item.period] = { bs: item.result, number: item.number };
                });
                
                allPeriods = Object.keys(periodData).sort().reverse();
                
                // Update pattern analyzer
                const recentResults = apiData.slice(0, 5).map(d => d.result);
                recentResults.forEach(r => patternAnalyzer.addResult(r));
                
                // Check last result
                await checkLastResult(apiData[0]);
                
                // Run prediction
                if (currentMode === 'pattern') {
                    runPatternPrediction(apiData);
                } else {
                    await runAIPrediction(apiData);
                }
                
                // Update history
                updateHistoryFromAPI(apiData);
                
            } catch (error) {
                console.error('Load error:', error);
            }
        }

        // ==================== CHECK LAST RESULT ====================
        async function checkLastResult(latestResult) {
            if (!lastPrediction || lastPeriodChecked === latestResult.period) return;
            
            const isWin = lastPrediction.pred === latestResult.result;
            
            // Update stats
            if (isWin) {
                totalWins++;
                currentBetX = 1;
            } else {
                totalLosses++;
                currentBetX++;
            }
            
            // Add to history
            predictionHistory.unshift({
                period: latestResult.period,
                pred_char: lastPrediction.pred,
                actual_char: latestResult.result,
                actual_num: latestResult.number,
                win: isWin
            });
            
            // Keep only last 100
            if (predictionHistory.length > 100) {
                predictionHistory.pop();
            }
            
            // Update pattern analyzer
            patternAnalyzer.addResult(latestResult.result);
            
            // Update stats
            updateStats();
            
            // Update history display (last 10 only)
            updateHistoryDisplay();
            
            lastPeriodChecked = latestResult.period;
        }

        // ==================== UPDATE STATS ====================
        function updateStats() {
            const total = totalWins + totalLosses;
            const winRate = total > 0 ? Math.round((totalWins / total) * 100) : 0;
            
            document.getElementById('winRateStat').textContent = winRate + '%';
            document.getElementById('winLossStat').textContent = totalWins + '/' + totalLosses;
            document.getElementById('totalStat').textContent = total;
            document.getElementById('currentXStat').textContent = currentBetX + 'X';
        }

        // ==================== UPDATE HISTORY DISPLAY (LAST 10 ONLY) ====================
        function updateHistoryDisplay() {
            const tbody = document.getElementById('historyBody');
            
            // Get last 10 results only
            const last10 = predictionHistory.slice(0, 10);
            
            tbody.innerHTML = '';
            
            last10.forEach(item => {
                const row = document.createElement('tr');
                
                // Period (shown here only)
                const periodCell = document.createElement('td');
                periodCell.className = 'period-cell';
                periodCell.textContent = item.period.slice(-8); // Show last 8 digits for cleaner display
                row.appendChild(periodCell);
                
                // Prediction/Actual
                const predActualCell = document.createElement('td');
                
                const predSpan = document.createElement('span');
                predSpan.className = `pred-cell ${item.pred_char === 'B' ? 'big' : 'small'}`;
                predSpan.textContent = item.pred_char === 'B' ? 'B' : 'S';
                
                const actualSpan = document.createElement('span');
                actualSpan.className = `actual-cell ${item.actual_char === 'B' ? 'big' : 'small'}`;
                actualSpan.textContent = item.actual_char === 'B' ? 'B' : 'S';
                
                predActualCell.appendChild(predSpan);
                predActualCell.appendChild(document.createTextNode('/'));
                predActualCell.appendChild(actualSpan);
                row.appendChild(predActualCell);
                
                // Result
                const resultCell = document.createElement('td');
                const badge = document.createElement('span');
                badge.className = item.win ? 'win-badge' : 'lose-badge';
                badge.textContent = item.win ? 'WIN' : 'LOSE';
                resultCell.appendChild(badge);
                row.appendChild(resultCell);
                
                tbody.appendChild(row);
            });
        }

        // ==================== UPDATE HISTORY FROM API ====================
        function updateHistoryFromAPI(apiData) {
            // Only update if we have predictions
            if (predictionHistory.length > 0) {
                updateHistoryDisplay();
            }
        }

        // ==================== PATTERN PREDICTION ====================
        function runPatternPrediction(apiData) {
            const { pred, confidence } = patternAnalyzer.predictNext();
            
            // Save prediction (period internally but not shown)
            lastPrediction = {
                period: apiData[0].period,
                pred: pred
            };
            
            // Update UI (no period shown)
            const predEl = document.getElementById('predictionValue');
            predEl.textContent = pred === 'B' ? 'BIG' : 'SMALL';
            predEl.className = 'prediction-value ' + (pred === 'B' ? 'big' : 'small');
            
            document.getElementById('confidenceText').textContent = 'CONFIDENCE: ' + confidence + '%';
            
            const barEl = document.getElementById('confidenceBar');
            barEl.style.width = confidence + '%';
            barEl.className = 'progress-fill ' + (pred === 'B' ? '' : 'small');
        }

        // ==================== AI PREDICTION ====================
        async function runAIPrediction(apiData) {
            const loadingEl = document.getElementById('aiLoading');
            const predEl = document.getElementById('predictionValue');
            
            loadingEl.style.display = 'block';
            predEl.textContent = '--';
            
            try {
                // Get Firebase data (1000 results)
                const snapshot = await database.ref('/global_trx/period_bs').once('value');
                const firebaseData = snapshot.val() || {};
                
                const firebasePeriods = Object.keys(firebaseData).sort().reverse();
                const recent1000 = firebasePeriods.slice(0, 1000);
                
                // Prepare results for AI
                const results1000 = recent1000.map(p => firebaseData[p].bs).join('');
                const last200 = results1000.slice(0, 200);
                
                // Count stats
                const bCount = (results1000.match(/B/g) || []).length;
                const sCount = (results1000.match(/S/g) || []).length;
                const total1000 = bCount + sCount;
                
                // Create detailed prompt for AI
                const prompt = `Analyze these 1000 TRX 1-minute results and predict the next result (BIG or SMALL).

PATTERN ANALYSIS:
Last 200 results: ${last200}
First 800 results summary: BIG=${bCount}, SMALL=${sCount}

STATISTICS:
Total 1000 results
BIG count: ${bCount} (${Math.round(bCount/10)}%)
SMALL count: ${sCount} (${Math.round(sCount/10)}%)
Ratio: ${bCount > sCount ? 'BIG' : 'SMALL'} dominant

RECENT PATTERNS:
Last 50: ${results1000.slice(0, 50)}
Last 20: ${results1000.slice(0, 20)}
Last 10: ${results1000.slice(0, 10)}
Last 5: ${results1000.slice(0, 5)}

Based on ALL this data, what is the most likely next result?
Reply with ONLY the word "BIG" or "SMALL". No other text.`;

                // Call AI API
                const response = await fetch(`https://r-gengpt-api.vercel.app/api/chat?prompt=${encodeURIComponent(prompt)}`);
                const aiResponse = await response.text();
                
                // Parse response - look for BIG or SMALL
                const cleanResponse = aiResponse.trim().toUpperCase();
                let prediction = null;
                
                if (cleanResponse.includes('BIG')) {
                    prediction = 'B';
                } else if (cleanResponse.includes('SMALL')) {
                    prediction = 'S';
                }
                
                // If AI response is unclear, use pattern as fallback
                if (!prediction) {
                    console.warn('AI response unclear, using pattern fallback');
                    const { pred } = patternAnalyzer.predictNext();
                    prediction = pred;
                }
                
                // Calculate confidence based on historical data
                const dominantCount = prediction === 'B' ? bCount : sCount;
                const confidence = Math.round((dominantCount / total1000) * 100);
                
                // Save prediction (period internally but not shown)
                lastPrediction = {
                    period: apiData[0].period,
                    pred: prediction
                };
                
                predEl.textContent = prediction === 'B' ? 'BIG' : 'SMALL';
                predEl.className = 'prediction-value ' + (prediction === 'B' ? 'big' : 'small');
                
                document.getElementById('confidenceText').textContent = 'AI CONFIDENCE: ' + confidence + '%';
                
                const barEl = document.getElementById('confidenceBar');
                barEl.style.width = confidence + '%';
                barEl.className = 'progress-fill ' + (prediction === 'B' ? '' : 'small');
                
            } catch (error) {
                console.error('AI error:', error);
                // Fallback to pattern
                runPatternPrediction(apiData);
            }
            
            loadingEl.style.display = 'none';
        }

        // ==================== TIMER ====================
        function startTimer() {
            function updateTimer() {
                const now = new Date();
                const seconds = now.getUTCSeconds();
                const remaining = 60 - seconds;
                
                // Timer display only (no period)
                document.getElementById('timer').textContent = 
                    `00:${String(remaining).padStart(2, '0')}`;
                
                // When timer hits 0 (new minute), refresh
                if (remaining === 0 || remaining === 60) {
                    fetchAPIData().then(apiData => {
                        if (apiData.length > 0) {
                            checkLastResult(apiData[0]);
                            loadFullData();
                        }
                    });
                }
            }
            updateTimer();
            setInterval(updateTimer, 1000);
        }

        // ==================== MODE SWITCHING ====================
        function setMode(mode) {
            currentMode = mode;
            
            document.getElementById('modePattern').className = mode === 'pattern' ? 'mode-btn active' : 'mode-btn';
            document.getElementById('modeAI').className = mode === 'ai' ? 'mode-btn active' : 'mode-btn';
            
            // Rerun prediction
            fetchAPIData().then(apiData => {
                if (apiData.length > 0) {
                    if (mode === 'pattern') {
                        runPatternPrediction(apiData);
                    } else {
                        runAIPrediction(apiData);
                    }
                }
            });
        }

        // Enter key shortcut
        document.getElementById('keyInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkKey();
            }
        });
    </script>
</body>
</html>
