<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>GLOBAL TRX • 1000 HISTORY</title>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #0a0c12;
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* KEY SECTION – ELEVATED */
        .key-section {
            background: linear-gradient(145deg, #1e2533, #131a26);
            border-radius: 40px;
            padding: 40px 24px;
            margin: 20px 0 40px;
            border: 1px solid #2f3a4b;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            backdrop-filter: blur(2px);
        }

        .lock-icon {
            width: 70px;
            height: 70px;
            background: #2a3442;
            border-radius: 30px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid #3b7cff;
            box-shadow: 0 8px 0 #0f1a2e;
        }

        .lock-icon svg {
            width: 34px;
            height: 34px;
            fill: none;
            stroke: #3b7cff;
            stroke-width: 2.5;
            stroke-linecap: round;
        }

        .key-title {
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 5px rgba(59,124,255,0.3);
        }

        .key-sub {
            color: #8f9bb3;
            text-align: center;
            font-size: 15px;
            margin-bottom: 32px;
            font-weight: 400;
        }

        .key-input-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .key-input {
            background: #0f151f;
            border: 2px solid #28303f;
            border-radius: 28px;
            padding: 18px 24px;
            font-size: 18px;
            color: #ffffff;
            outline: none;
            transition: all 0.2s;
            letter-spacing: 1px;
            font-weight: 500;
            text-align: center;
        }

        .key-input:focus {
            border-color: #3b7cff;
            background: #121b28;
            box-shadow: 0 0 0 4px rgba(59,124,255,0.15);
        }

        .key-button {
            background: linear-gradient(145deg, #3b7cff, #2a5fdd);
            border: none;
            border-radius: 28px;
            padding: 18px 24px;
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 10px 0 #13203a, 0 4px 18px rgba(59,124,255,0.4);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .key-button:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #13203a, 0 4px 18px rgba(59,124,255,0.4);
        }

        .key-message {
            color: #ff8a8a;
            font-size: 15px;
            text-align: center;
            margin-top: 20px;
            min-height: 24px;
            font-weight: 500;
        }

        .key-footer-note {
            text-align: center;
            color: #4e5c73;
            font-size: 13px;
            margin-top: 20px;
            border-top: 1px dashed #2e3849;
            padding-top: 20px;
        }

        /* Main Content */
        .main-content {
            display: none;
        }

        /* Header */
        .header {
            background: linear-gradient(145deg, #1e2432, #151b26);
            border-radius: 24px;
            padding: 24px 20px;
            margin-bottom: 16px;
            border: 1px solid #2f3542;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 14px;
            color: #8f9bb3;
        }

        /* Timer Card */
        .timer-card {
            background: #1a1f2b;
            border-radius: 24px;
            padding: 24px 20px;
            margin-bottom: 16px;
            border: 1px solid #2f3542;
            text-align: center;
        }

        .timer-label {
            font-size: 14px;
            color: #8f9bb3;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .timer-value {
            font-size: 64px;
            font-weight: 700;
            color: #3b7cff;
            line-height: 1;
            margin-bottom: 12px;
            font-family: 'Courier New', monospace;
        }

        .period-value {
            font-size: 16px;
            color: #8f9bb3;
            background: #0f131a;
            padding: 8px 16px;
            border-radius: 30px;
            display: inline-block;
        }

        /* Prediction Card */
        .prediction-card {
            background: linear-gradient(145deg, #1e2a3a, #15222f);
            border-radius: 32px;
            padding: 32px 20px;
            margin-bottom: 16px;
            border: 1px solid #3b7cff;
            text-align: center;
        }

        .next-period {
            font-size: 16px;
            color: #8f9bb3;
            margin-bottom: 16px;
        }

        .prediction-value {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 16px;
            letter-spacing: 4px;
        }

        .prediction-value.big {
            color: #3b7cff;
        }

        .prediction-value.small {
            color: #ff4d4d;
        }

        .confidence-text {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 16px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #0f131a;
            border-radius: 30px;
            overflow: hidden;
            margin: 16px 0 8px;
        }

        .progress-fill {
            height: 100%;
            background: #3b7cff;
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 30px;
        }

        .progress-fill.small {
            background: #ff4d4d;
        }

        /* Stats Grid (Accuracy, Total, Longest Lose, Longest Win) */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: #1a1f2b;
            border-radius: 20px;
            padding: 16px 8px;
            border: 1px solid #2f3542;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #8f9bb3;
            margin-bottom: 8px;
            font-weight: 500;
            white-space: nowrap;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
        }

        .stat-value.green {
            color: #2ecc71;
        }

        .stat-value.blue {
            color: #3b7cff;
        }

        .stat-value.red {
            color: #ff4d4d;
        }

        /* Logics Grid */
        .logics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .logic-card {
            background: #1a1f2b;
            border-radius: 20px;
            padding: 16px 12px;
            border: 1px solid #2f3542;
        }

        .logic-title {
            font-size: 12px;
            color: #8f9bb3;
            margin-bottom: 8px;
        }

        .logic-result {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .logic-result.big {
            color: #3b7cff;
        }

        .logic-result.small {
            color: #ff4d4d;
        }

        .logic-confidence {
            font-size: 12px;
            color: #8f9bb3;
        }

        .logic-matches {
            font-size: 10px;
            color: #5d6a83;
            margin-top: 4px;
        }

        /* History Section */
        .history-section {
            background: #1a1f2b;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid #2f3542;
            margin-bottom: 16px;
        }

        .section-header {
            background: #0f131a;
            padding: 16px 20px;
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            border-bottom: 1px solid #2f3542;
        }

        .history-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .history-item {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1.5fr;
            padding: 12px 16px;
            border-bottom: 1px solid #2f3542;
            font-size: 13px;
            align-items: center;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-period {
            color: #8f9bb3;
        }

        .history-number {
            color: #ffffff;
            font-weight: 500;
        }

        .history-result {
            font-weight: 600;
        }

        .history-result.big {
            color: #3b7cff;
        }

        .history-result.small {
            color: #ff4d4d;
        }

        .history-time {
            color: #5d6a83;
            font-size: 11px;
            text-align: right;
        }

        /* NO REFRESH BUTTON - removed as requested */
        
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #8f9bb3;
        }

        .auto-refresh-note {
            text-align: center;
            color: #4e5c73;
            font-size: 12px;
            margin: 8px 0 20px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- KEY SECTION – Premium style -->
        <div class="key-section" id="keySection">
            <div class="lock-icon">
                <svg viewBox="0 0 24 24">
                    <rect x="5" y="11" width="14" height="11" rx="2" ry="2" stroke="currentColor" />
                    <path d="M8 11V8a4 4 0 0 1 8 0v3" />
                </svg>
            </div>
            <div class="key-title">Access Vault</div>
            <div class="key-sub">enter your private key</div>
            <div class="key-input-group">
                <input type="text" id="keyInput" class="key-input" placeholder="••••••••" autocomplete="off">
                <button class="key-button" onclick="checkKey()">unlock →</button>
            </div>
            <div id="keyMessage" class="key-message"></div>
            <div class="key-footer-note">premium prediction • deep pattern</div>
        </div>

        <!-- Main Content -->
        <div id="mainContent" class="main-content">
            <!-- Header -->
            <div class="header">
                <h1>GLOBAL TRX</h1>
                <p>Developed by MICK</p>
            </div>

            <!-- Timer -->
            <div class="timer-card">
                <div class="timer-label">Next Result In</div>
                <div class="timer-value" id="timer">00:00</div>
                <div class="period-value" id="currentPeriod">Loading...</div>
            </div>

            <!-- Prediction -->
            <div class="prediction-card">
                <div class="next-period" id="nextPeriod">Period: --</div>
                <div class="prediction-value" id="predictionValue">--</div>
                <div class="confidence-text" id="confidenceText">Confidence: 0%</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="confidenceBar"></div>
                </div>
            </div>

            <!-- ACCURACY / TOTAL / LONGEST LOSE / LONGEST WIN (based on last 1000) -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Accuracy</div>
                    <div class="stat-value green" id="accuracyStat">0%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total (1k)</div>
                    <div class="stat-value" id="totalPredStat">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Longest Lose</div>
                    <div class="stat-value red" id="longestLoseStat">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Longest Win</div>
                    <div class="stat-value blue" id="longestWinStat">0</div>
                </div>
            </div>

            <!-- All Logics (calculated from last 1000) -->
            <div class="logics-grid" id="logicsContainer"></div>

            <!-- History (last 20 of 1000) -->
            <div class="history-section">
                <div class="section-header">RESULTS</div>
                <div class="history-list" id="historyList">
                    <div class="loading">Loading 1000 results...</div>
                </div>
            </div>

            <!-- Auto refresh indicator (no button) -->
            <div class="auto-refresh-note">STT မသုံးရ PREDICTOR</div>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBiUJPpEmepO0XiWmhPA8rMZjioB5Y2wr4",
            authDomain: "global-trx-db.firebaseapp.com",
            databaseURL: "https://global-trx-db-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "global-trx-db",
            storageBucket: "global-trx-db.firebasestorage.app",
            messagingSenderId: "20311434523",
            appId: "1:20311434523:web:b5cd2eded2d7cd9e011fbe"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Global variable to store full 1000+ periods (sorted descending)
        let allPeriods = [];
        let periodData = {};

        // Key check
        async function checkKey() {
            const key = document.getElementById('keyInput').value.trim();
            const messageEl = document.getElementById('keyMessage');
            
            if (!key) {
                messageEl.textContent = '⛔ key required';
                return;
            }

            try {
                const snapshot = await database.ref('/global_trx/keys/' + key).once('value');
                const keyData = snapshot.val();
                
                if (!keyData) {
                    messageEl.textContent = '❌ invalid key';
                    return;
                }

                const today = new Date();
                const expiry = new Date(keyData.expiry);
                
                if (expiry < today) {
                    messageEl.textContent = '⌛ key expired';
                    return;
                }

                if (keyData.used >= keyData.limit) {
                    messageEl.textContent = '⚠️ usage limit reached';
                    return;
                }

                await database.ref('/global_trx/keys/' + key + '/used').set(keyData.used + 1);
                
                document.getElementById('keySection').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                
                // Load full 1000+ data
                await loadFullData();
                startTimer(); // timer handles auto refresh at 0 seconds
                
            } catch (error) {
                console.error(error);
                messageEl.textContent = '⚠️ system error';
            }
        }

        // Timer (UTC) - auto refreshes when timer hits 0
        function startTimer() {
            function updateTimer() {
                const now = new Date();
                const seconds = now.getUTCSeconds();
                const remaining = 60 - seconds;
                
                document.getElementById('timer').textContent = 
                    `00:${String(remaining).padStart(2, '0')}`;
                
                const minutes = now.getUTCMinutes();
                const hours = now.getUTCHours();
                const totalMinutes = hours * 60 + minutes;
                
                const y = now.getUTCFullYear();
                const m = String(now.getUTCMonth() + 1).padStart(2, '0');
                const d = String(now.getUTCDate()).padStart(2, '0');
                
                const periodNumber = 10000 + totalMinutes;
                const currentPeriod = `${y}${m}${d}${periodNumber}`;
                
                document.getElementById('currentPeriod').textContent = currentPeriod;
                
                // AUTO REFRESH when timer hits 0 (new minute)
                if (remaining === 0 || remaining === 60) {
                    loadFullData();
                }
            }
            updateTimer();
            setInterval(updateTimer, 1000);
        }

        // Load full data (fetch all, then keep latest 1000+)
        async function loadFullData() {
            try {
                const snapshot = await database.ref('/global_trx/period_bs').once('value');
                periodData = snapshot.val() || {};
                
                // Get all periods, sort descending (newest first)
                allPeriods = Object.keys(periodData).sort().reverse();
                
                if (allPeriods.length === 0) return;

                // Use at most 1000 periods for calculations
                const recent1000 = allPeriods.slice(0, Math.min(1000, allPeriods.length));
                
                // Update all UI with recent1000
                updateAdvancedStats(periodData, recent1000);
                
                // Run predictions using recent1000
                const predictions = runPredictions(periodData, recent1000);
                updatePredictionUI(predictions, allPeriods[0]); // next period based on absolute latest
                updateLogicsUI(predictions.logics);
                
                // Show last 20 of all (latest 20)
                updateHistory(periodData, allPeriods.slice(0, 20));
                
            } catch (error) {
                console.error('Load error:', error);
            }
        }

        // Update stats based on recent1000
        function updateAdvancedStats(periodData, periods) {
            const total = periods.length;
            let bCount = 0, sCount = 0;
            
            // streak
            let currentWin = 0, currentLose = 0;
            let longestWin = 0, longestLose = 0;
            
            for (let p of periods) {
                const res = periodData[p].bs;
                if (res === 'B') {
                    bCount++;
                    currentWin++;
                    currentLose = 0;
                    if (currentWin > longestWin) longestWin = currentWin;
                } else {
                    sCount++;
                    currentLose++;
                    currentWin = 0;
                    if (currentLose > longestLose) longestLose = currentLose;
                }
            }
            
            // Accuracy: last 3 repeat test on newest 500 of the 1000
            let correct = 0, tested = 0;
            const testPeriods = periods.slice(0, Math.min(500, periods.length));
            for (let i = 3; i < testPeriods.length; i++) {
                const prev3 = testPeriods.slice(i-3, i).map(p => periodData[p].bs).join('');
                const actual = periodData[testPeriods[i]].bs;
                
                let matchB = 0, matchS = 0;
                for (let j = 0; j < i-3; j++) {
                    if (testPeriods.slice(j, j+3).map(p => periodData[p].bs).join('') === prev3) {
                        const nextRes = periodData[testPeriods[j+3]].bs;
                        if (nextRes === 'B') matchB++; else matchS++;
                    }
                }
                if (matchB + matchS > 0) {
                    tested++;
                    const pred = matchB > matchS ? 'B' : (matchS > matchB ? 'S' : null);
                    if (pred === actual) correct++;
                }
            }
            const acc = tested > 0 ? ((correct / tested) * 100).toFixed(1) : '0.0';
            
            document.getElementById('accuracyStat').textContent = acc + '%';
            document.getElementById('totalPredStat').textContent = total;
            document.getElementById('longestLoseStat').textContent = longestLose;
            document.getElementById('longestWinStat').textContent = longestWin;
        }

        // --- PREDICTION LOGICS (operate on recent1000) ---
        function runPredictions(periodData, periods) {
            const logics = [];
            
            // Logic 1: Last 3 Digits Pattern
            if (periods.length >= 4) {
                const last3 = periods.slice(1, 4).map(p => periodData[p].bs).join('');
                const matches = [];
                
                for (let i = 0; i < periods.length - 4; i++) {
                    const check3 = periods.slice(i+1, i+4).map(p => periodData[p].bs).join('');
                    if (check3 === last3) {
                        matches.push(periodData[periods[i+4]].bs);
                    }
                }
                
                if (matches.length > 0) {
                    const bCount = matches.filter(m => m === 'B').length;
                    const sCount = matches.filter(m => m === 'S').length;
                    const total = matches.length;
                    
                    if (bCount > sCount) {
                        logics.push({
                            name: 'Last 3 Digits',
                            pred: 'B',
                            conf: Math.round((bCount / total) * 100),
                            matches: total
                        });
                    } else if (sCount > bCount) {
                        logics.push({
                            name: 'Last 3 Digits',
                            pred: 'S',
                            conf: Math.round((sCount / total) * 100),
                            matches: total
                        });
                    }
                }
            }

            // Logic 2: Period Ending 3 Digits
            if (periods.length >= 2) {
                const lastPeriod = periods[0];
                const last3Digits = lastPeriod.slice(-3);
                const matches = [];
                
                for (let i = 0; i < periods.length - 1; i++) {
                    if (periods[i].slice(-3) === last3Digits) {
                        matches.push(periodData[periods[i+1]].bs);
                    }
                }
                
                if (matches.length > 0) {
                    const bCount = matches.filter(m => m === 'B').length;
                    const sCount = matches.filter(m => m === 'S').length;
                    const total = matches.length;
                    
                    if (bCount > sCount) {
                        logics.push({
                            name: 'Period End 3',
                            pred: 'B',
                            conf: Math.round((bCount / total) * 100),
                            matches: total
                        });
                    } else if (sCount > bCount) {
                        logics.push({
                            name: 'Period End 3',
                            pred: 'S',
                            conf: Math.round((sCount / total) * 100),
                            matches: total
                        });
                    }
                }
            }

            // Logic 3: Overall Ratio
            if (periods.length > 0) {
                let bCount = 0, sCount = 0;
                for (let p of periods) {
                    if (periodData[p].bs === 'B') bCount++;
                    else sCount++;
                }
                
                const total = periods.length;
                if (bCount > sCount) {
                    logics.push({
                        name: 'Overall Ratio',
                        pred: 'B',
                        conf: Math.round((bCount / total) * 100),
                        big: bCount,
                        small: sCount
                    });
                } else {
                    logics.push({
                        name: 'Overall Ratio',
                        pred: 'S',
                        conf: Math.round((sCount / total) * 100),
                        big: bCount,
                        small: sCount
                    });
                }
            }

            // Logic 4: Last 4 Digits
            if (periods.length >= 5) {
                const last4 = periods.slice(1, 5).map(p => periodData[p].bs).join('');
                const matches = [];
                
                for (let i = 0; i < periods.length - 5; i++) {
                    const check4 = periods.slice(i+1, i+5).map(p => periodData[p].bs).join('');
                    if (check4 === last4) {
                        matches.push(periodData[periods[i+5]].bs);
                    }
                }
                
                if (matches.length > 0) {
                    const bCount = matches.filter(m => m === 'B').length;
                    const sCount = matches.filter(m => m === 'S').length;
                    const total = matches.length;
                    
                    if (bCount > sCount) {
                        logics.push({
                            name: 'Last 4 Digits',
                            pred: 'B',
                            conf: Math.round((bCount / total) * 100),
                            matches: total
                        });
                    } else if (sCount > bCount) {
                        logics.push({
                            name: 'Last 4 Digits',
                            pred: 'S',
                            conf: Math.round((sCount / total) * 100),
                            matches: total
                        });
                    }
                }
            }

            // Logic 5: Period Ending 4 Digits
            if (periods.length >= 2) {
                const lastPeriod = periods[0];
                const last4Digits = lastPeriod.slice(-4);
                const matches = [];
                
                for (let i = 0; i < periods.length - 1; i++) {
                    if (periods[i].slice(-4) === last4Digits) {
                        matches.push(periodData[periods[i+1]].bs);
                    }
                }
                
                if (matches.length > 0) {
                    const bCount = matches.filter(m => m === 'B').length;
                    const sCount = matches.filter(m => m === 'S').length;
                    const total = matches.length;
                    
                    if (bCount > sCount) {
                        logics.push({
                            name: 'Period End 4',
                            pred: 'B',
                            conf: Math.round((bCount / total) * 100),
                            matches: total
                        });
                    } else if (sCount > bCount) {
                        logics.push({
                            name: 'Period End 4',
                            pred: 'S',
                            conf: Math.round((sCount / total) * 100),
                            matches: total
                        });
                    }
                }
            }

            // Logic 6: Last 9 Pattern
            if (periods.length >= 10) {
                const last9 = periods.slice(1, 10).map(p => periodData[p].bs).join('');
                const matches = [];
                
                for (let i = 0; i < periods.length - 10; i++) {
                    const check9 = periods.slice(i+1, i+10).map(p => periodData[p].bs).join('');
                    if (check9 === last9) {
                        matches.push(periodData[periods[i+10]].bs);
                    }
                }
                
                if (matches.length > 0) {
                    const bCount = matches.filter(m => m === 'B').length;
                    const sCount = matches.filter(m => m === 'S').length;
                    const total = matches.length;
                    
                    if (bCount > sCount) {
                        logics.push({
                            name: 'Last 9 Pattern',
                            pred: 'B',
                            conf: Math.round((bCount / total) * 100),
                            matches: total
                        });
                    } else if (sCount > bCount) {
                        logics.push({
                            name: 'Last 9 Pattern',
                            pred: 'S',
                            conf: Math.round((sCount / total) * 100),
                            matches: total
                        });
                    }
                }
            }

            // Final Prediction (Weighted)
            let bScore = 0, sScore = 0, totalConf = 0;
            
            for (let logic of logics) {
                const weight = logic.conf / 100;
                totalConf += weight;
                
                if (logic.pred === 'B') {
                    bScore += weight;
                } else {
                    sScore += weight;
                }
            }

            let finalPred;
            if (bScore > sScore) {
                finalPred = {
                    pred: 'B',
                    conf: Math.round((bScore / totalConf) * 100)
                };
            } else {
                finalPred = {
                    pred: 'S',
                    conf: Math.round((sScore / totalConf) * 100)
                };
            }

            return {
                final: finalPred,
                logics: logics
            };
        }

        // Update Prediction UI
        function updatePredictionUI(predictions, lastPeriod) {
            let nextPeriod = 'N/A';
            try {
                nextPeriod = String(parseInt(lastPeriod) + 1);
            } catch {
                nextPeriod = lastPeriod;
            }
            
            document.getElementById('nextPeriod').textContent = 'Period: ' + nextPeriod;
            
            const predEl = document.getElementById('predictionValue');
            predEl.textContent = predictions.final.pred === 'B' ? 'BIG' : 'SMALL';
            predEl.className = 'prediction-value ' + (predictions.final.pred === 'B' ? 'big' : 'small');
            
            document.getElementById('confidenceText').textContent = 'Confidence: ' + predictions.final.conf + '%';
            
            const barEl = document.getElementById('confidenceBar');
            barEl.style.width = predictions.final.conf + '%';
            barEl.className = 'progress-fill ' + (predictions.final.pred === 'B' ? '' : 'small');
        }

        // Update Logics UI
        function updateLogicsUI(logics) {
            const container = document.getElementById('logicsContainer');
            container.innerHTML = '';
            
            logics.slice(0, 6).forEach(logic => {
                const card = document.createElement('div');
                card.className = 'logic-card';
                
                let extraHtml = '';
                if (logic.matches) {
                    extraHtml = `<div class="logic-matches">${logic.matches} matches</div>`;
                } else if (logic.big) {
                    extraHtml = `<div class="logic-matches">B:${logic.big} S:${logic.small}</div>`;
                }
                
                card.innerHTML = `
                    <div class="logic-title">${logic.name}</div>
                    <div class="logic-result ${logic.pred === 'B' ? 'big' : 'small'}">
                        ${logic.pred === 'B' ? 'BIG' : 'SMALL'}
                    </div>
                    <div class="logic-confidence">${logic.conf}%</div>
                    ${extraHtml}
                `;
                
                container.appendChild(card);
            });
        }

        // Update History (show last 20)
        function updateHistory(periodData, periods) {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';
            
            periods.slice(0, 20).forEach(period => {
                const data = periodData[period];
                if (!data) return;
                const item = document.createElement('div');
                item.className = 'history-item';
                
                let timeStr = '';
                if (data.t) {
                    try {
                        const d = new Date(data.t);
                        timeStr = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    } catch {
                        timeStr = '--';
                    }
                }
                
                item.innerHTML = `
                    <div class="history-period">${period.slice(-8)}</div>
                    <div class="history-number">${data.num || 0}</div>
                    <div class="history-result ${data.bs === 'B' ? 'big' : 'small'}">
                        ${data.bs === 'B' ? 'BIG' : 'SML'}
                    </div>
                    <div class="history-time">${timeStr}</div>
                `;
                
                historyList.appendChild(item);
            });
        }

        // Enter key shortcut
        document.getElementById('keyInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkKey();
            }
        });
    </script>
